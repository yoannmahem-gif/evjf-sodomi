<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVJF — Admin 🗂️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose: #f4a7b9;
      --rose-deep: #e8768f;
      --blush: #fdf0f4;
      --gold: #c9a96e;
      --text: #3a2a2f;
      --text-light: #8a7070;
      --white: #ffffff;
      --shadow: 0 4px 24px rgba(232, 118, 143, 0.12);
      --green: #4caf7d;
      --red: #e8768f;
      --trash-bg: #fff5f7;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: linear-gradient(135deg, #fdf0f4 0%, #fef7f0 50%, #f9f0fd 100%);
      min-height: 100vh;
      color: var(--text);
      padding: 0 16px 60px;
    }

    header {
      text-align: center;
      padding: 40px 16px 28px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      color: var(--text);
    }
    header h1 span { color: var(--rose-deep); font-style: italic; }

    header p {
      margin-top: 8px;
      color: var(--text-light);
      font-size: 0.9rem;
      font-style: italic;
    }

    .section-wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: var(--text);
      margin: 32px 0 14px;
    }
    .section-title .badge {
      background: var(--rose-deep);
      color: white;
      border-radius: 100px;
      padding: 2px 10px;
      font-family: 'Lato', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .section-title.trash-title .badge { background: #bbb; }

    /* Table */
    .table-wrap {
      background: var(--white);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: var(--blush);
      padding: 12px 18px;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-light);
    }
    thead th:last-child { text-align: center; width: 80px; }

    tbody tr {
      border-top: 1px solid #fbe8ef;
      transition: background 0.15s;
    }
    tbody tr:hover { background: #fdf5f8; }

    td {
      padding: 14px 18px;
      font-size: 0.93rem;
      color: var(--text);
      line-height: 1.5;
      vertical-align: middle;
    }

    td.date {
      color: var(--text-light);
      font-size: 0.78rem;
      white-space: nowrap;
      width: 110px;
    }

    td.actions { text-align: center; }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 6px 8px;
      border-radius: 8px;
      transition: background 0.15s, transform 0.1s;
      line-height: 1;
    }
    .icon-btn:hover { background: var(--blush); transform: scale(1.15); }
    .icon-btn.restore:hover { background: #e8f5ee; }

    /* Status dot */
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .dot-active   { background: var(--green); }
    .dot-done     { background: #aaa; }
    .dot-skipped  { background: #f0a500; }

    /* Trash section */
    .trash-wrap {
      background: var(--trash-bg);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1.5px dashed #f4a7b9;
    }
    .trash-wrap thead th { background: #fde8ee; }
    .trash-wrap tbody tr { border-top: 1px solid #fcd5df; }
    .trash-wrap tbody tr:hover { background: #fdf0f4; }

    .empty-row td {
      text-align: center;
      color: var(--text-light);
      font-style: italic;
      padding: 28px;
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .stat-chip {
      background: var(--white);
      border-radius: 12px;
      padding: 10px 16px;
      box-shadow: var(--shadow);
      font-size: 0.85rem;
    }
    .stat-chip strong { color: var(--rose-deep); font-size: 1.2rem; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #3a2a2f;
      color: white;
      padding: 12px 22px;
      border-radius: 12px;
      font-size: 0.88rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .spinner {
      display: flex;
      justify-content: center;
      padding: 40px;
    }
    .spinner::after {
      content: '';
      width: 32px; height: 32px;
      border: 3px solid var(--rose);
      border-top-color: var(--rose-deep);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 540px) {
      td.date { display: none; }
      thead th.col-date { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <h1>🗂️ Admin <span>EVJF</span></h1>
    <p>Garde ce lien pour toi — gère et trie les questions avant le jour J.</p>
  </header>

  <div class="section-wrap">

    <div class="stats" id="stats"></div>

    <div class="section-title">
      ✨ Questions actives
      <span class="badge" id="badge-active">0</span>
    </div>

    <div class="table-wrap" id="active-wrap">
      <div class="spinner"></div>
    </div>

    <div class="section-title trash-title" style="margin-top:40px">
      🗑️ Corbeille
      <span class="badge" id="badge-trash">0</span>
    </div>

    <div class="table-wrap trash-wrap" id="trash-wrap">
      <div class="spinner"></div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    let all = [];

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function fmtDate(s) {
      if (!s) return '';
      const d = new Date(s.replace(' ', 'T') + 'Z');
      return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
    }

    const toast = document.getElementById('toast');
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    async function load() {
      const res = await fetch('/api/questions?all=1', { cache: 'no-store' });
      all = await res.json();
      render();
    }

    function render() {
      const active  = all.filter(q => !q.trashed);
      const trashed = all.filter(q =>  q.trashed);

      document.getElementById('badge-active').textContent = active.length;
      document.getElementById('badge-trash').textContent  = trashed.length;

      const done   = active.filter(q => q.done).length;
      const undone = active.filter(q => !q.done).length;
      document.getElementById('stats').innerHTML = `
        <div class="stat-chip"><strong>${active.length}</strong> question${active.length !== 1 ? 's' : ''} au total</div>
        <div class="stat-chip"><strong>${undone}</strong> à jouer</div>
        <div class="stat-chip"><strong>${done}</strong> déjà répondue${done !== 1 ? 's' : ''}</div>
      `;

      document.getElementById('active-wrap').innerHTML = buildTable(active, false);
      document.getElementById('trash-wrap').innerHTML  = buildTable(trashed, true);
    }

    function buildTable(rows, isTrashed) {
      const actionHeader = isTrashed ? 'Restaurer' : 'Corbeille';
      let html = `<table>
        <thead><tr>
          <th>#</th>
          <th>Question</th>
          ${!isTrashed ? '<th>Statut</th>' : ''}
          <th class="col-date">Ajoutée le</th>
          <th>${actionHeader}</th>
        </tr></thead>
        <tbody>`;

      if (rows.length === 0) {
        const colspan = isTrashed ? 3 : 4;
        html += `<tr class="empty-row"><td colspan="${colspan + 1}">${isTrashed ? 'La corbeille est vide 🌸' : 'Aucune question active'}</td></tr>`;
      } else {
        rows.forEach((q, i) => {
          const status = !isTrashed
            ? (q.done
                ? '<span class="dot dot-done"></span>Répondue'
                : q.skipped
                  ? '<span class="dot dot-skipped"></span>Passée'
                  : '<span class="dot dot-active"></span>À jouer')
            : '';
          const btn = isTrashed
            ? `<button class="icon-btn restore" title="Restaurer" onclick="restore(${q.id})">♻️</button>
               <button class="icon-btn delete" title="Supprimer définitivement" onclick="deletePermanent(${q.id})">❌</button>`
            : `<button class="icon-btn" title="Mettre à la corbeille" onclick="trash(${q.id})">🗑️</button>`;

          html += `<tr>
            <td style="color:var(--text-light);font-size:0.8rem">${i + 1}</td>
            <td>${escapeHtml(q.question)}</td>
            ${!isTrashed ? `<td style="font-size:0.8rem;white-space:nowrap">${status}</td>` : ''}
            <td class="date">${fmtDate(q.created_at)}</td>
            <td class="actions">${btn}</td>
          </tr>`;
        });
      }

      html += '</tbody></table>';
      return html;
    }

    async function trash(id) {
      await fetch(`/api/questions/${id}/trash`, { method: 'PATCH' });
      const q = all.find(q => q.id === id);
      if (q) q.trashed = 1;
      render();
      showToast('Question mise à la corbeille 🗑️');
    }

    async function restore(id) {
      await fetch(`/api/questions/${id}/restore`, { method: 'PATCH' });
      const q = all.find(q => q.id === id);
      if (q) q.trashed = 0;
      render();
      showToast('Question restaurée ✅');
    }

    async function deletePermanent(id) {
      if (!confirm('Supprimer définitivement cette question ? Cette action est irréversible.')) return;
      await fetch(`/api/questions/${id}`, { method: 'DELETE' });
      all = all.filter(q => q.id !== id);
      render();
      showToast('Question supprimée définitivement 🗑️');
    }

    load();
    setInterval(load, 5000);
  </script>
</body>
</html>
